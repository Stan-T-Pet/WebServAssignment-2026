services:
  mongo:
    image: mongo:latest
    container_name: mongo-inventory
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminPassword123
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: api-inventory
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://admin:adminPassword123@mongo:27017/?authSource=admin
      MONGO_DB: inventory_db
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY:-}

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

  dashboard:
    build: .
    container_name: dashboard
    restart: unless-stopped
    command: python3 -m uvicorn dashboard:app --host 0.0.0.0 --port 8001
    depends_on:
      - api
      - grafana
    ports:
      - "8001:8001"

  jenkins:
    build:
      context: ./jenkins
    image: webservassignment-jenkins:lts-docker
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false

volumes:
  mongo_data:
  jenkins_home:
  grafana_data: